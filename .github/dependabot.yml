version: 2

# Dependabot configuration for ed3design-engineering-bundles.
# Updates are batched weekly; major-version bumps need manual review.
# Note: the only tool (generate_fusion360_parameters.py) uses the Python
# standard library only, so there is no pip/pyproject ecosystem to track.

updates:
  # GitHub Actions used in .github/workflows/*.yml
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions-minor:
        update-types:
          - "minor"
          - "patch"

  # npm — Claude Code CLI is the only npm dependency installed in CI
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps)"
